<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App de test Docker</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2a37;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #d9f99d, transparent 35%), var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(700px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.5rem, 2.8vw, 2rem);
    }

    .ok {
      margin-top: 16px;
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 600;
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Application web de test Docker</h1>
    <p>Si vous voyez cette page dans votre navigateur, le conteneur est bien déployé.</p>
    <p class="ok">Conteneur opérationnel</p>
    <p>URL attendue : <code>http://localhost:8080</code></p>
  </main>
</body>
</html>
